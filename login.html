<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard Consultivo</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="dashboard.css">
    
    <!-- Auth Logic -->
    <script type="module" src="auth.js"></script>
</head>

<body class="flex font-sans min-h-screen items-center justify-center transition-colors duration-300 relative overflow-hidden bg-slate-900">
    <!-- Theme Toggle Button -->
    <button id="theme-toggle" class="absolute top-6 right-6" title="Alternar Tema">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
    </button>

    <!-- Background Decor -->
    <div class="orb-1"></div>
    <div class="orb-2"></div>

    <div class="glass-panel p-8 md:p-10 max-w-md w-full mx-4 z-10 relative shadow-2xl animate-in fade-in duration-700 slide-in-from-bottom-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500 mb-2">Bem-vindo(a)</h1>
            <p id="form-subtitle" class="text-white/50 text-sm">Faça login para acessar o Dashboard</p>
        </div>

        <div id="error-msg" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg mb-6 text-center animate-in fade-in">
            Credenciais inválidas.
        </div>

        <!-- Formulário de Email/Senha -->
        <form id="auth-form" class="space-y-5">
            <div id="name-field" class="hidden max-h-0 overflow-hidden transition-all duration-300 opacity-0">
                <label class="block text-xs text-white/50 mb-1 uppercase tracking-wider font-bold">Nome</label>
                <input type="text" id="name" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" placeholder="Seu nome completo">
            </div>
            
            <div>
                <label class="block text-xs text-white/50 mb-1 uppercase tracking-wider font-bold">Email</label>
                <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" placeholder="seu@email.com">
            </div>
            
            <div>
                <label class="block text-xs text-white/50 mb-1 uppercase tracking-wider font-bold">Senha</label>
                <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 mt-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold transition-all shadow-lg hover:shadow-purple-500/25 relative overflow-hidden group">
                <span class="relative z-10" id="submit-text">Entrar</span>
                <div class="absolute inset-0 h-full w-full scale-0 rounded-lg transition-all duration-300 group-hover:scale-100 group-hover:bg-white/20 z-0"></div>
            </button>
        </form>

        <div class="my-6 flex items-center">
            <div class="flex-grow border-t border-white/10"></div>
            <span class="mx-4 text-xs text-white/40 uppercase font-bold">Ou</span>
            <div class="flex-grow border-t border-white/10"></div>
        </div>

        <button id="google-login-btn" type="button" class="w-full py-3 rounded-lg bg-white/5 border border-white/10 text-white font-bold hover:bg-white/10 transition-all flex items-center justify-center gap-3">
            <svg class="w-5 h-5 bg-white rounded-full p-0.5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="text-white/90">Entrar com Google</span>
        </button>

        <p class="text-center mt-8 text-sm text-white/50">
            <span id="toggle-text">Não tem uma conta?</span>
            <a href="#" id="toggle-auth" class="text-purple-400 hover:text-purple-300 font-bold ml-1 transition-colors">Cadastre-se</a>
        </p>

        <!-- Informação Importante para o Usuário Desenvolvedor -->
        <div id="firebase-warning" class="hidden mt-6 p-4 bg-yellow-500/10 border border-yellow-500/50 rounded-lg text-xs text-yellow-500 relative">
            <p class="font-bold mb-1">Apenas para o Desenvolvedor:</p>
            <p>Você precisa configurar as credenciais do Firebase no arquivo <code>auth.js</code> para que o login funcione.</p>
        </div>
    </div>
    
    <script>
        // Tema da página de login isolado (para não depender 100% do principal)
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function setTheme(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.body.classList.add('dark');
                darkIcon.classList.add('hidden');
                lightIcon.classList.remove('hidden');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                document.body.classList.remove('dark');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                localStorage.setItem('color-theme', 'light');
            }
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('color-theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setTheme(true);
        } else {
            setTheme(false); // Default to light if preferred or null based on previous dash logic, but let's stick to saved. Defaulting to false.
            if(savedTheme == null) setTheme(false); // day default
        }

        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            setTheme(!isDark);
        });
    </script>
</body>
</html>
